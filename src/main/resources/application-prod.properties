# --- Perfil PROD: base de datos MySQL ---
# Los valores se leen de variables de entorno (definidas en docker-compose.yml).
# Los valores despues de ":" son los que se usan si la variable de entorno no esta definida.

spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:examen}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root}

spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# En produccion no se recrea el esquema desde cero (create-drop borraria los datos),
# pero se crean las tablas que falten y se actualizan automaticamente segun las entidades.
spring.jpa.hibernate.ddl-auto=update

spring.h2.console.enabled=false