<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments/header :: header"></head>
<body>
<div th:replace="fragments/menu :: menu"></div>

<div class="container mt-4">
    <h1 class="mb-4" th:if="${pregunta.id == null}">Nueva Pregunta</h1>
    <h1 class="mb-4" th:if="${pregunta.id != null}">Editar Pregunta</h1>

    <form th:action="@{/preguntas/guardar}" th:object="${pregunta}" method="post" class="card card-body">
        <input type="hidden" th:field="*{id}">

        <div class="mb-3">
            <label for="enunciado" class="form-label">Enunciado</label>
            <textarea class="form-control" th:field="*{enunciado}" id="enunciado" rows="3"
                      th:classappend="${#fields.hasErrors('enunciado')} ? 'is-invalid'"></textarea>
            <div class="invalid-feedback" th:each="err : ${#fields.errors('enunciado')}" th:text="${err}"></div>
        </div>

        <div class="mb-3">
            <label for="dificultad" class="form-label">Dificultad (1-5)</label>
            <select class="form-select" th:field="*{dificultad}" id="dificultad"
                    th:classappend="${#fields.hasErrors('dificultad')} ? 'is-invalid'">
                <option value="">Seleccionar...</option>
                <option value="1">1 - Muy facil</option>
                <option value="2">2 - Facil</option>
                <option value="3">3 - Media</option>
                <option value="4">4 - Dificil</option>
                <option value="5">5 - Muy dificil</option>
            </select>
            <div class="invalid-feedback" th:each="err : ${#fields.errors('dificultad')}" th:text="${err}"></div>
        </div>

        <div class="mb-3">
            <label for="tematica" class="form-label">Tematica</label>
            <select class="form-select" th:field="*{tematica}" id="tematica"
                    th:classappend="${#fields.hasErrors('tematica')} ? 'is-invalid'">
                <option value="">Seleccionar...</option>
                <option th:each="t : ${tematicas}" th:value="${t.id}" th:text="${t.nombre}"></option>
            </select>
            <div class="invalid-feedback" th:each="err : ${#fields.errors('tematica')}" th:text="${err}"></div>
        </div>

        <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary">Guardar</button>
            <a th:href="@{/preguntas}" class="btn btn-secondary">Cancelar</a>
        </div>
    </form>
</div>

<script th:src="@{/js/bootstrap.bundle.min.js}"></script>
</body>
</html>
