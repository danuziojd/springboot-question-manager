<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments/header :: header">
</head>
<body>
<div th:replace="fragments/menu :: menu"></div>

<div class="container main-content">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <h1 class="mb-4" th:if="${pregunta.id == null}">Nueva Pregunta</h1>
            <h1 class="mb-4" th:if="${pregunta.id != null}">Editar Pregunta</h1>

            <form th:action="@{/preguntas/guardar}" th:object="${pregunta}" method="post" class="card shadow-sm">
                <div class="card-body">
                    <input type="hidden" th:field="*{id}">

                    <div class="mb-3">
                        <label for="enunciado" class="form-label fw-semibold">Enunciado</label>
                        <textarea class="form-control" th:field="*{enunciado}" id="enunciado" rows="3"
                                  th:classappend="${#fields.hasErrors('enunciado')} ? 'is-invalid'"></textarea>
                        <div class="invalid-feedback" th:each="err : ${#fields.errors('enunciado')}" th:text="${err}"></div>
                    </div>

                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label for="dificultad" class="form-label fw-semibold">Dificultad (1-5)</label>
                            <select class="form-select" th:field="*{dificultad}" id="dificultad"
                                    th:classappend="${#fields.hasErrors('dificultad')} ? 'is-invalid'">
                                <option value="">Seleccionar...</option>
                                <option value="1">1 - Muy fácil</option>
                                <option value="2">2 - Fácil</option>
                                <option value="3">3 - Media</option>
                                <option value="4">4 - Difícil</option>
                                <option value="5">5 - Muy difícil</option>
                            </select>
                            <div class="invalid-feedback" th:each="err : ${#fields.errors('dificultad')}" th:text="${err}"></div>
                        </div>

                        <div class="col-md-6">
                            <label for="tematica" class="form-label fw-semibold">Temática</label>
                            <select class="form-select" th:field="*{tematica}" id="tematica"
                                    th:classappend="${#fields.hasErrors('tematica')} ? 'is-invalid'">
                                <option value="">Seleccionar...</option>
                                <option th:each="t : ${tematicas}" th:value="${t.id}" th:text="${t.nombre}"></option>
                            </select>
                            <div class="invalid-feedback" th:each="err : ${#fields.errors('tematica')}" th:text="${err}"></div>
                        </div>
                    </div>

                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary px-4">Guardar</button>
                        <a th:href="@{/preguntas}" class="btn btn-outline-secondary">Cancelar</a>
                    </div>
                </div>
            </form>
        </div>
    </div>
</div>

<footer class="footer mt-auto py-3 bg-light border-top">
    <div class="container text-center text-muted small">
        &copy; 2025 - Gestor de Preguntas
    </div>
</footer>

<script th:src="@{/js/bootstrap.bundle.min.js}"></script>
</body>
</html>
