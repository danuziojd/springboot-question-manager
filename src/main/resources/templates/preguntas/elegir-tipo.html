<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments/header :: header"></head>
<body>
<div th:replace="fragments/menu :: menu"></div>

<div class="container mt-4">
    <h1 class="mb-4">Nueva Pregunta</h1>
    <p>Selecciona el tipo de pregunta que deseas crear:</p>

    <div class="row g-3 mt-2">
        <div class="col-md-4">
            <div class="card text-center h-100">
                <div class="card-body">
                    <h5 class="card-title">Verdadero / Falso</h5>
                    <p class="card-text">Pregunta con respuesta de verdadero o falso.</p>
                    <a th:href="@{/preguntas/nueva/verdadero-falso}" class="btn btn-primary">Crear</a>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card text-center h-100">
                <div class="card-body">
                    <h5 class="card-title">Selección Única</h5>
                    <p class="card-text">Pregunta con una sola respuesta correcta.</p>
                    <a th:href="@{/preguntas/nueva/seleccion-unica}" class="btn btn-primary">Crear</a>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card text-center h-100">
                <div class="card-body">
                    <h5 class="card-title">Selección Múltiple</h5>
                    <p class="card-text">Pregunta con varias respuestas correctas.</p>
                    <a th:href="@{/preguntas/nueva/seleccion-multiple}" class="btn btn-primary">Crear</a>
                </div>
            </div>
        </div>
    </div>

    <div class="mt-3">
        <a th:href="@{/preguntas}" class="btn btn-secondary">Volver</a>
    </div>
</div>

<script th:src="@{/js/bootstrap.bundle.min.js}"></script>
</body>
</html>
