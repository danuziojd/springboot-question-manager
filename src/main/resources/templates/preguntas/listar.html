<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments/header :: header">
</head>
<body>
<div th:replace="fragments/menu :: menu"></div>

<div class="container main-content">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1 class="h3 mb-0">Preguntas</h1>
        <a th:href="@{/preguntas/nueva}" class="btn btn-primary">
            + Nueva Pregunta
        </a>
    </div>

    <div th:if="${mensaje}" class="alert alert-success alert-dismissible fade show" role="alert">
        <span th:text="${mensaje}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
        <span th:text="${error}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div class="card shadow-sm mb-4">
        <div class="card-body">
            <form method="get" class="row g-3 align-items-end">
                <div class="col-md-4">
                    <label class="form-label fw-semibold small">Temática</label>
                    <select name="tematicaId" class="form-select">
                        <option value="">Todas las temáticas</option>
                        <option th:each="t : ${tematicas}" th:value="${t.id}" th:text="${t.nombre}"
                                th:selected="${tematicaId != null && tematicaId == t.id}"></option>
                    </select>
                </div>
                <div class="col-md-4">
                    <label class="form-label fw-semibold small">Tipo</label>
                    <select name="tipo" class="form-select">
                        <option value="">Todos los tipos</option>
                        <option value="VF" th:selected="${tipo == 'VF'}">Verdadero/Falso</option>
                        <option value="SU" th:selected="${tipo == 'SU'}">Selección Única</option>
                        <option value="SM" th:selected="${tipo == 'SM'}">Selección Múltiple</option>
                    </select>
                </div>
                <div class="col-md-4 d-flex gap-2">
                    <button type="submit" class="btn btn-secondary flex-fill">Filtrar</button>
                    <a th:href="@{/preguntas}" class="btn btn-outline-secondary flex-fill">Limpiar</a>
                </div>
            </form>
        </div>
    </div>

    <div class="card shadow-sm">
        <div class="table-responsive">
            <table class="table table-hover table-striped mb-0">
                <thead class="table-dark">
                    <tr>
                        <th class="text-center" style="width: 60px">ID</th>
                        <th>Enunciado</th>
                        <th class="text-center" style="width: 140px">Tipo</th>
                        <th class="text-center" style="width: 90px">Dificultad</th>
                        <th style="width: 140px">Temática</th>
                        <th class="text-center" style="width: 150px">Acciones</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="pregunta : ${preguntas}">
                        <td class="text-center" th:text="${pregunta.id}"></td>
                        <td th:text="${pregunta.enunciado}"></td>
                        <td class="text-center">
                            <span th:switch="${pregunta.getClass().simpleName}"
                                  class="badge rounded-pill">
                                <span th:case="'PreguntaVerdadeiroFalso'" class="badge bg-info">VF</span>
                                <span th:case="'PreguntaSeleccionUnica'" class="badge bg-success">SU</span>
                                <span th:case="'PreguntaSeleccionMultiple'" class="badge bg-warning text-dark">SM</span>
                                <span th:case="*" th:text="${pregunta.getClass().simpleName}" class="badge bg-secondary"></span>
                            </span>
                        </td>
                        <td class="text-center">
                            <span th:text="${pregunta.dificultad}" class="badge bg-secondary"></span>
                        </td>
                        <td th:text="${pregunta.tematica.nombre}"></td>
                        <td class="text-center">
                            <div class="d-flex gap-1 justify-content-center">
                                <a th:href="@{/preguntas/editar/{id}(id=${pregunta.id})}"
                                   class="btn btn-sm btn-outline-warning"
                                   title="Editar">
                                    Editar
                                </a>
                                <a th:href="@{/preguntas/eliminar/{id}(id=${pregunta.id})}"
                                   class="btn btn-sm btn-outline-danger"
                                   onclick="return confirm('¿Seguro que deseas eliminar esta pregunta?')"
                                   title="Eliminar">
                                    Eliminar
                                </a>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <nav th:if="${pagina.totalPages > 1}" class="mt-4">
        <ul class="pagination justify-content-center">
            <li class="page-item" th:classappend="${pagina.first} ? 'disabled'">
                <a class="page-link" th:href="@{/preguntas(page=0, tematicaId=${tematicaId}, tipo=${tipo})}">&laquo;</a>
            </li>
            <li class="page-item" th:classappend="${pagina.first} ? 'disabled'">
                <a class="page-link" th:href="@{/preguntas(page=${pagina.number - 1}, tematicaId=${tematicaId}, tipo=${tipo})}">&lsaquo;</a>
            </li>
            <li class="page-item" th:each="i : ${#numbers.sequence(0, pagina.totalPages - 1)}"
                th:classappend="${i == pagina.number} ? 'active'">
                <a class="page-link" th:href="@{/preguntas(page=${i}, tematicaId=${tematicaId}, tipo=${tipo})}" th:text="${i + 1}"></a>
            </li>
            <li class="page-item" th:classappend="${pagina.last} ? 'disabled'">
                <a class="page-link" th:href="@{/preguntas(page=${pagina.number + 1}, tematicaId=${tematicaId}, tipo=${tipo})}">&rsaquo;</a>
            </li>
            <li class="page-item" th:classappend="${pagina.last} ? 'disabled'">
                <a class="page-link" th:href="@{/preguntas(page=${pagina.totalPages - 1}, tematicaId=${tematicaId}, tipo=${tipo})}">&raquo;</a>
            </li>
        </ul>
    </nav>
</div>

<footer class="footer mt-auto py-3 bg-light border-top">
    <div class="container text-center text-muted small">
        &copy; 2025 - Gestor de Preguntas
    </div>
</footer>

<script th:src="@{/js/bootstrap.bundle.min.js}"></script>
</body>
</html>
