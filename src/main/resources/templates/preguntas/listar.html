<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments/header :: header"></head>
<body>
<div th:replace="fragments/menu :: menu"></div>

<div class="container mt-4">
    <h1 class="mb-4">Preguntas</h1>

    <div th:if="${mensaje}" class="alert alert-success alert-dismissible fade show" role="alert">
        <span th:text="${mensaje}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
        <span th:text="${error}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <a th:href="@{/preguntas/nueva}" class="btn btn-primary mb-3">+ Nueva Pregunta</a>

    <table class="table table-striped table-hover">
        <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Enunciado</th>
                <th>Dificultad</th>
                <th>Tematica</th>
                <th>Acciones</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="pregunta : ${preguntas}">
                <td th:text="${pregunta.id}"></td>
                <td th:text="${pregunta.enunciado}"></td>
                <td th:text="${pregunta.dificultad}"></td>
                <td th:text="${pregunta.tematica.nombre}"></td>
                <td>
                    <a th:href="@{/preguntas/editar/{id}(id=${pregunta.id})}" class="btn btn-sm btn-warning">Editar</a>
                    <a th:href="@{/preguntas/eliminar/{id}(id=${pregunta.id})}" class="btn btn-sm btn-danger"
                       onclick="return confirm('?Seguro que deseas eliminar esta pregunta?')">Eliminar</a>
                </td>
            </tr>
        </tbody>
    </table>

    <nav th:if="${pagina.totalPages > 1}">
        <ul class="pagination">
            <li class="page-item" th:classappend="${pagina.first} ? 'disabled'">
                <a class="page-link" th:href="@{/preguntas(page=0)}">&laquo;</a>
            </li>
            <li class="page-item" th:classappend="${pagina.first} ? 'disabled'">
                <a class="page-link" th:href="@{/preguntas(page=${pagina.number - 1})}">&lsaquo;</a>
            </li>
            <li class="page-item" th:each="i : ${#numbers.sequence(0, pagina.totalPages - 1)}"
                th:classappend="${i == pagina.number} ? 'active'">
                <a class="page-link" th:href="@{/preguntas(page=${i})}" th:text="${i + 1}"></a>
            </li>
            <li class="page-item" th:classappend="${pagina.last} ? 'disabled'">
                <a class="page-link" th:href="@{/preguntas(page=${pagina.number + 1})}">&rsaquo;</a>
            </li>
            <li class="page-item" th:classappend="${pagina.last} ? 'disabled'">
                <a class="page-link" th:href="@{/preguntas(page=${pagina.totalPages - 1})}">&raquo;</a>
            </li>
        </ul>
    </nav>
</div>

<script th:src="@{/js/bootstrap.bundle.min.js}"></script>
</body>
</html>
