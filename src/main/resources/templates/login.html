<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments/header :: header">
</head>
<body>

<div class="container main-content">
    <div class="row justify-content-center">
        <div class="col-lg-4">
            <div class="hero-section text-center">
                <h1 class="h3 fw-bold mb-4">Iniciar Sesión</h1>

                <div th:if="${param.error}" class="alert alert-danger">
                    Usuario o contraseña incorrectos.
                </div>
                <div th:if="${param.logout}" class="alert alert-success">
                    Has cerrado sesión correctamente.
                </div>

                <form th:action="@{/login}" method="post">
                    <div class="mb-3 text-start">
                        <label for="username" class="form-label fw-semibold">Usuario</label>
                        <input type="text" id="username" name="username" class="form-control" placeholder="admin" required>
                    </div>
                    <div class="mb-3 text-start">
                        <label for="password" class="form-label fw-semibold">Contraseña</label>
                        <input type="password" id="password" name="password" class="form-control" placeholder="••••••" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Entrar</button>
                </form>

                <div class="mt-3">
                    <a th:href="@{/}" class="text-muted small">Volver al inicio</a>
                </div>
            </div>
        </div>
    </div>
</div>

<footer class="footer mt-auto py-3 bg-light border-top">
    <div class="container text-center text-muted small">
        &copy; 2025 - Gestor de Preguntas
    </div>
</footer>

<script th:src="@{/js/bootstrap.bundle.min.js}"></script>
</body>
</html>
