<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments/header :: header">
</head>
<body>
<div th:replace="fragments/menu :: menu"></div>

<div class="container main-content">
    <div class="row justify-content-center">
        <div class="col-lg-6">
            <h1 class="mb-4" th:if="${tematica.id == null}">Nueva Temática</h1>
            <h1 class="mb-4" th:if="${tematica.id != null}">Editar Temática</h1>

            <form th:action="@{/tematicas/guardar}" th:object="${tematica}" method="post" class="card shadow-sm">
                <div class="card-body">
                    <input type="hidden" th:field="*{id}">

                    <div class="mb-4">
                        <label for="nombre" class="form-label fw-semibold">Nombre</label>
                        <input type="text" class="form-control" th:field="*{nombre}" id="nombre"
                               placeholder="Ej: Matemáticas, Historia..."
                               th:classappend="${#fields.hasErrors('nombre')} ? 'is-invalid'">
                        <div class="invalid-feedback" th:each="err : ${#fields.errors('nombre')}" th:text="${err}"></div>
                    </div>

                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary px-4">Guardar</button>
                        <a th:href="@{/tematicas}" class="btn btn-outline-secondary">Cancelar</a>
                    </div>
                </div>
            </form>
        </div>
    </div>
</div>

<footer class="footer mt-auto py-3 bg-light border-top">
    <div class="container text-center text-muted small">
        &copy; 2025 - Gestor de Preguntas
    </div>
</footer>

<script th:src="@{/js/bootstrap.bundle.min.js}"></script>
</body>
</html>
