<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments/header :: header"></head>
<body>
<div th:replace="fragments/menu :: menu"></div>

<div class="container mt-4">
    <h1 class="mb-4" th:if="${tematica.id == null}">Nueva Tematica</h1>
    <h1 class="mb-4" th:if="${tematica.id != null}">Editar Tematica</h1>

    <form th:action="@{/tematicas/guardar}" th:object="${tematica}" method="post" class="card card-body">
        <input type="hidden" th:field="*{id}">

        <div class="mb-3">
            <label for="nombre" class="form-label">Nombre</label>
            <input type="text" class="form-control" th:field="*{nombre}" id="nombre"
                   th:classappend="${#fields.hasErrors('nombre')} ? 'is-invalid'">
            <div class="invalid-feedback" th:each="err : ${#fields.errors('nombre')}" th:text="${err}"></div>
        </div>

        <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary">Guardar</button>
            <a th:href="@{/tematicas}" class="btn btn-secondary">Cancelar</a>
        </div>
    </form>
</div>

<script th:src="@{/js/bootstrap.bundle.min.js}"></script>
</body>
</html>
