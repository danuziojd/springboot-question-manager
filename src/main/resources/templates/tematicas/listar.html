<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments/header :: header">
</head>
<body>
<div th:replace="fragments/menu :: menu"></div>

<div class="container main-content">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1 class="h3 mb-0">Temáticas</h1>
        <a th:href="@{/tematicas/nueva}" class="btn btn-primary">+ Nueva Temática</a>
    </div>

    <div th:if="${mensaje}" class="alert alert-success alert-dismissible fade show" role="alert">
        <span th:text="${mensaje}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
        <span th:text="${error}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div class="card shadow-sm">
        <div class="table-responsive">
            <table class="table table-hover table-striped mb-0">
                <thead class="table-dark">
                    <tr>
                        <th class="text-center" style="width: 80px">ID</th>
                        <th>Nombre</th>
                        <th class="text-center" style="width: 180px">Acciones</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="tematica : ${tematicas}">
                        <td class="text-center" th:text="${tematica.id}"></td>
                        <td th:text="${tematica.nombre}"></td>
                        <td class="text-center">
                            <div class="d-flex gap-1 justify-content-center">
                                <a th:href="@{/tematicas/editar/{id}(id=${tematica.id})}"
                                   class="btn btn-sm btn-outline-warning">Editar</a>
                                <a th:href="@{/tematicas/eliminar/{id}(id=${tematica.id})}"
                                   class="btn btn-sm btn-outline-danger"
                                   onclick="return confirm('¿Seguro que deseas eliminar esta temática?')">Eliminar</a>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <nav th:if="${pagina.totalPages > 1}" class="mt-4">
        <ul class="pagination justify-content-center">
            <li class="page-item" th:classappend="${pagina.first} ? 'disabled'">
                <a class="page-link" th:href="@{/tematicas(page=0)}">&laquo;</a>
            </li>
            <li class="page-item" th:classappend="${pagina.first} ? 'disabled'">
                <a class="page-link" th:href="@{/tematicas(page=${pagina.number - 1})}">&lsaquo;</a>
            </li>
            <li class="page-item" th:each="i : ${#numbers.sequence(0, pagina.totalPages - 1)}"
                th:classappend="${i == pagina.number} ? 'active'">
                <a class="page-link" th:href="@{/tematicas(page=${i})}" th:text="${i + 1}"></a>
            </li>
            <li class="page-item" th:classappend="${pagina.last} ? 'disabled'">
                <a class="page-link" th:href="@{/tematicas(page=${pagina.number + 1})}">&rsaquo;</a>
            </li>
            <li class="page-item" th:classappend="${pagina.last} ? 'disabled'">
                <a class="page-link" th:href="@{/tematicas(page=${pagina.totalPages - 1})}">&raquo;</a>
            </li>
        </ul>
    </nav>
</div>

<footer class="footer mt-auto py-3 bg-light border-top">
    <div class="container text-center text-muted small">
        &copy; 2025 - Gestor de Preguntas
    </div>
</footer>

<script th:src="@{/js/bootstrap.bundle.min.js}"></script>
</body>
</html>
