services:

  # Base de datos MySQL
  mysql:
    image: mysql:8.4
    container_name: examen-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: examen
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s

  # Aplicacion Spring Boot
  app:
    build: .
    container_name: examen-app
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: examen
      DB_USERNAME: root
      DB_PASSWORD: root
    ports:
      - "8080:8080"

volumes:
  mysql_data: